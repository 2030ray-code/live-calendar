<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,interactive-widget=resizes-content">
<title>ライブカレンダー</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
:root{
  --accent:#4a9fd4;--accent-light:#e8f4ff;--dot:#5a9fd4;
  --bg:#FBFAFF;--card:#F4F6FA;--border:#dde1ec;--border-light:#e8ebf4;
  --text:#5a5d6b;--text2:#9295a5;--radius:10px;--radius-sm:6px;
}
.theme-pink{--bg:#FFF5F7;--card:#FDF0F3;--border:#f0c8d0;--border-light:#fae0e6}
.theme-mint{--bg:#F3FBF7;--card:#E9F7EF;--border:#b8dfc9;--border-light:#d4eede}
.theme-lavender{--bg:#F5F3FF;--card:#EDEAFF;--border:#c8c0f0;--border-light:#ddd8f8}
.theme-peach{--bg:#FFF8F3;--card:#FFF0E6;--border:#f0ccb0;--border-light:#fae0cc}
.theme-sky{--bg:#F3F8FF;--card:#E8F2FF;--border:#b8d4f0;--border-light:#d4e8f8}

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px}
.app{max-width:700px;margin:0 auto;padding:1rem .75rem 5rem;position:relative}
h1{font-size:17px;font-weight:600;display:flex;align-items:center;gap:6px}
.icon-btn{background:none;border:none;cursor:pointer;font-size:19px;color:var(--text2);padding:4px 7px;border-radius:var(--radius-sm)}
.icon-btn:hover{background:var(--border-light);color:var(--text)}
.palette-wrap{position:relative;display:flex;align-items:center;gap:5px}

.add-btn{background:var(--dot);color:#fff;border:none;border-radius:var(--radius-sm);padding:5px 13px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:4px;font-weight:500}
.add-btn:hover{opacity:.85}
.sync-indicator{font-size:10px;color:var(--text2);display:flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;background:var(--border-light);white-space:nowrap}
.sync-indicator.syncing{color:#f59e0b}
.sync-indicator.ok{color:#10b981}
.sync-indicator.err{color:#ef4444}
.login-bar{display:none}
.login-bar .user-info{flex:1;color:var(--text2)}
.login-bar .user-info b{color:var(--text)}
.btn-login{background:var(--dot);color:#fff;border:none;border-radius:var(--radius-sm);padding:4px 12px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:4px}

.tag-filter-bar{
  display:flex;gap:6px;flex-wrap:wrap;margin-bottom:.9rem;align-items:center;
  position:sticky;top:88px;z-index:58;
  background:var(--bg) !important;
  padding:6px .75rem 4px;margin-left:-.75rem;margin-right:-.75rem
}
.tag-filter-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;cursor:pointer;border:1.5px solid var(--border);transition:all .15s}
.tag-filter-chip.all{background:var(--dot);color:#fff;border:1.5px solid var(--dot)}
.tag-filter-chip.all.inactive{background:none;color:var(--dot);border:1.5px solid var(--dot)}

.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:1rem;width:100%}
.day-hdr{text-align:center;font-size:10px;color:var(--text2);padding:3px 0;width:100%}
.day-hdr.sat{color:#4a9fd4}
.day-hdr.sun{color:#e8547a}
.day-cell{min-height:52px;border-radius:var(--radius-sm);border:1px solid var(--border-light);padding:3px;cursor:pointer;background:var(--card);transition:background .1s;width:100%;min-width:0;overflow:hidden}
.day-cell:hover{background:#f0f4ff}
.day-cell.other{opacity:.28}
.day-cell.today .dnum{background:#f41010;color:#fff;border-radius:50%;width:21px;height:21px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600}
.day-cell.sel{border-color:var(--dot);border-width:1.5px}
.day-cell.sat-cell>.dnum{color:#4a9fd4}
.day-cell.sun-cell>.dnum,.day-cell.hol-cell>.dnum{color:#e8547a}
.dnum{font-size:11px;font-weight:500;width:21px;height:21px;display:flex;align-items:center;justify-content:center}
.ev-chip{font-size:8px;border-radius:3px;padding:1px 3px;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;display:block}
.panel{background:var(--card);border:1px solid var(--border-light);border-radius:var(--radius);padding:1rem;margin-bottom:.75rem}
.panel-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:.85rem}
.panel-title{font-size:13px;font-weight:500;color:var(--text2)}
.ev-list{display:flex;flex-direction:column;gap:.65rem}
.ev-card{border-radius:var(--radius);overflow:hidden;background:var(--card);position:relative;display:flex;border:1px solid var(--border-light)}
.ev-accent{width:5px;flex-shrink:0}
.ev-inner{flex:1;min-width:0;position:relative}
.ev-actions{position:absolute;top:7px;right:7px;display:flex;gap:3px;z-index:2}
.aico{background:rgba(255,255,255,.92);border:1px solid var(--border);border-radius:5px;width:25px;height:25px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;color:var(--text2)}
.aico:hover{background:var(--border-light)}
.aico.del:hover{color:#e8547a}

.carousel{position:relative;width:100%;background:var(--card);overflow:hidden}
.carousel-track{display:flex;transition:transform .3s ease}
.carousel-slide{flex-shrink:0;width:100%}
.carousel-slide img{width:100%;max-height:280px;object-fit:contain;display:block}
.carousel-btn{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.4);color:#fff;border:none;border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;z-index:3}
.carousel-btn.prev{left:6px}
.carousel-btn.next{right:6px}
.carousel-dots{display:flex;justify-content:center;gap:4px;padding:4px 0;background:var(--card)}
.carousel-dot{width:6px;height:6px;border-radius:50%;background:#ccc;cursor:pointer}
.carousel-dot.active{background:var(--dot)}
.ev-body{padding:.6rem .7rem}
.ev-title{font-size:13.5px;font-weight:600;margin-bottom:4px;padding-right:86px}
.ev-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:5px}
.ev-tag{display:inline-flex;align-items:center;gap:2px;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:500;border:none}
.ev-meta{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:5px}
.meta-chip{font-size:11px;color:var(--text2);display:flex;align-items:center;gap:2px}
.time-row{display:flex;gap:5px;margin-bottom:6px;flex-wrap:wrap;align-items:center}
.tbadge{border:1px solid var(--dot);border-radius:5px;padding:2px 7px;display:inline-flex;align-items:center;gap:3px;height:22px}
.tbadge-lbl{font-size:8.5px}
.tbadge-val{font-size:10.5px;font-weight:600}
.ticket-sm{display:inline-flex;align-items:center;gap:3px;border:1px solid var(--dot);color:var(--dot);border-radius:5px;padding:2px 9px;font-size:10px;cursor:pointer;text-decoration:none;background:none;height:22px}
.ticket-sm:hover{background:var(--accent-light)}
.ev-detail{font-size:11px;color:#454851;white-space:pre-wrap;line-height:1.6;margin-top:2px}

.priv-btns{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;margin-bottom:10px}
.priv-btn{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:500;cursor:pointer;border:1.5px solid var(--border);background:var(--bg);color:var(--text2);transition:all .15s}
.priv-btn:hover{border-color:var(--dot);color:var(--dot);background:var(--accent-light)}
.priv-btn.active{border-color:var(--dot);color:var(--dot);background:var(--accent-light)}
.priv-section{margin-top:8px;border-top:1px solid var(--border-light);padding-top:8px;margin-bottom:10px}

.cheki-carousel{position:relative;width:100%;background:var(--border-light);border-radius:var(--radius-sm);overflow:hidden;min-height:80px}
.cheki-track{display:flex;transition:transform .3s ease}
.cheki-slide{flex-shrink:0;width:100%}
.cheki-slide img{width:100%;max-height:240px;object-fit:contain;display:block;cursor:zoom-in}
.cheki-empty{color:var(--text2);font-size:12px;text-align:center;padding:1.5rem}
.cheki-add-zone{border:1.5px dashed var(--dot);border-radius:var(--radius-sm);padding:.75rem;text-align:center;cursor:pointer;font-size:12px;color:var(--dot);position:relative;margin-top:6px;background:var(--accent-light)}
.cheki-add-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.cheki-add-zone:hover{opacity:.8}

.cheki-edit-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:6px}
.cheki-edit-item{border-radius:var(--radius-sm);overflow:hidden;background:var(--border-light);display:flex;flex-direction:column}
.cheki-edit-item img{width:100%;aspect-ratio:1;object-fit:cover;cursor:zoom-in;display:block}
.cheki-edit-controls{display:flex;align-items:center;justify-content:space-between;padding:3px 4px;background:var(--bg);gap:2px}
.cheki-edit-btn{background:var(--border-light);border:none;border-radius:4px;width:26px;height:26px;color:var(--text2);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cheki-edit-btn:hover{background:var(--border)}
.cheki-edit-btn.del{margin-left:auto}
.cheki-edit-btn.del:hover{background:#fca5a5;color:#e8547a}
.cheki-edit-btn:disabled{opacity:.25;cursor:default;pointer-events:none}
.cheki-edit-bar{display:flex;gap:6px;margin-bottom:6px;align-items:center}
.cheki-edit-toggle{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:3px 10px;border-radius:20px;cursor:pointer;border:1px solid var(--border);background:var(--bg);color:var(--text2)}
.cheki-edit-toggle.active{border-color:var(--dot);color:var(--dot);background:var(--accent-light)}

.img-overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:999;display:flex;align-items:center;justify-content:center;padding:16px;cursor:zoom-out}
.img-overlay img{max-width:100%;max-height:90vh;border-radius:var(--radius);object-fit:contain}
.img-overlay-close{position:absolute;top:14px;right:14px;background:rgba(255,255,255,.15);border:none;border-radius:50%;width:34px;height:34px;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}

.empty{text-align:center;color:var(--text2);font-size:12px;padding:1.5rem}

.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.48);display:flex;align-items:flex-end;justify-content:center;z-index:100}
@media(min-width:541px){.modal-bg{align-items:center}}
.modal{background:var(--card);border-radius:var(--radius) var(--radius) 0 0;padding:1.25rem 1.25rem 2rem;width:100%;max-width:500px;max-height:92vh;overflow-y:auto}
@media(min-width:541px){.modal{border-radius:var(--radius);width:92%}}
.modal h2{font-size:15px;font-weight:600;margin-bottom:.9rem}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:.65rem}
.fg{display:flex;flex-direction:column;gap:3px}
.fg label{font-size:11px;color:var(--text2);font-weight:500}
.fg input,.fg select,.fg textarea{font-size:15px;border-radius:var(--radius-sm);border:1px solid var(--border);background:#fff;color:var(--text);padding:6px 9px;width:100%;font-family:inherit;box-sizing:border-box}
.fg textarea{resize:vertical;min-height:90px}
.time-sel-row{display:flex;gap:5px;align-items:center}
.time-sel-row select{flex:1;min-width:0}
.time-sel-row span{font-size:13px;color:var(--text2)}
.drop-zone{border:1.5px dashed var(--border);border-radius:var(--radius-sm);padding:.9rem;text-align:center;cursor:pointer;font-size:12px;color:var(--text2);position:relative}
.drop-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.modal-acts{display:flex;gap:7px;justify-content:flex-end;margin-top:.9rem}
.btn-p{border:none;border-radius:var(--radius-sm);padding:7px 18px;font-size:13px;cursor:pointer;background:var(--dot);color:#fff;font-weight:500}
.btn-p:hover{opacity:.85}
.btn-s{background:none;border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 13px;font-size:13px;cursor:pointer;color:var(--text)}
.btn-s:hover{background:var(--border-light)}

.flyer-previews{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.flyer-preview-item{position:relative;width:70px;height:70px}
.flyer-preview-item img{width:70px;height:70px;object-fit:cover;border-radius:5px;border:1px solid var(--border)}
.flyer-preview-item .rm-flyer{position:absolute;top:-4px;right:-4px;background:#dc2626;color:#fff;border:none;border-radius:50%;width:16px;height:16px;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.toast{position:fixed;bottom:5rem;left:50%;transform:translateX(-50%);font-size:12px;padding:6px 16px;border-radius:20px;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none;background:#222;color:#fff;white-space:nowrap}
.toast.show{opacity:1}

.mob-nav{display:none;align-items:center;gap:4px;margin-bottom:0;position:sticky;top:44px;z-index:59;background:var(--bg) !important;padding:4px .75rem;margin-left:-.75rem;margin-right:-.75rem}
.mob-month{font-size:15px;font-weight:600;min-width:110px;text-align:center}
.mob-view{display:none;flex-direction:column;gap:0}
.mob-cal-overlay{display:none;background:var(--bg)}
.mob-cal-overlay.open{display:block}
.mob-card{display:flex;background:var(--card);cursor:pointer;align-items:stretch;min-height:68px;transition:background .1s;border-radius:var(--radius);border:1px solid var(--border-light);margin-bottom:6px;overflow:hidden}
.mob-card:last-child{margin-bottom:0}
.mob-acc{width:5px;flex-shrink:0}

.mob-date-col{
  display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 10px;
  width:52px;min-width:52px;max-width:52px;flex-shrink:0;
  border-right:1px solid var(--border-light);
  background:var(--card) !important;
}
.mob-dnum{font-size:17px;font-weight:600;line-height:1;color:var(--text);opacity:.85}
.mob-dnum.td{color:#f41010}
.mob-dnum.sat{color:#4a9fd4}
.mob-dnum.sun{color:#e8547a}
.mob-dow{font-size:9px;color:var(--text2);margin-top:2px}
.mob-dow.sat{color:#4a9fd4}
.mob-dow.sun{color:#e8547a}
.mob-flyer-col{width:56px;flex-shrink:0;display:flex;align-items:center;justify-content:center;padding:5px 3px 5px 7px}
.mob-flyer-img{width:52px;height:52px;border-radius:6px;object-fit:cover;border:1px solid var(--border-light)}
.mob-flyer-phを開く{width:52px;height:52px;border-radius:6px;background:var(--border-light);display:flex;align-items:center;justify-content:center;color:var(--border);font-size:18px}
.mob-info{flex:1;padding:6px 6px 6px 9px;display:flex;flex-direction:column;justify-content:center;min-width:0}
.mob-title-row{display:flex;align-items:baseline;gap:6px;min-width:0;overflow:hidden}
.mob-title{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.mob-venue{font-size:10px;color:var(--text2);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mob-times{font-size:10px;color:var(--dot);margin-top:2px;font-weight:500}
.mob-tags{display:flex;gap:3px;margin-top:3px;flex-wrap:wrap}
.mob-tag{font-size:9px;font-weight:500;padding:1px 6px;border-radius:10px;border:none}
.mob-chev{display:flex;align-items:center;padding-right:9px;color:var(--border);font-size:13px}
.mob-add-fab{position:fixed;bottom:1.3rem;right:1.3rem;background:var(--dot);color:#fff;border:none;border-radius:50%;width:52px;height:52px;font-size:26px;cursor:pointer;display:none;align-items:center;justify-content:center;z-index:30;box-shadow:0 3px 14px rgba(0,0,0,.22)}
.mob-empty{background:var(--card);border:1px solid var(--border-light);border-radius:var(--radius)}

@media(max-width:540px){
  .desk-only{display:none!important}
  .mob-nav{display:flex}
  .mob-view{display:flex}
  .mob-add-fab{display:flex}
  .form-row{grid-template-columns:1fr!important}
  
  .form-row.date-venue-row{display:flex!important;gap:8px;align-items:flex-end !important}
  .form-row.date-venue-row .fg:first-child{flex:0 0 42%;min-width:0}
  .form-row.date-venue-row .fg:last-child{flex:1 1 0;min-width:0}
  .form-row.date-venue-row .fg input{width:100%;height:38px!important;font-size:13px;padding:6px 8px!important}
  .form-row.date-venue-row .fg input[type=date]{font-size:11px;height:38px!important;padding:0 6px!important}
}

.tag-tap-area{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:2px}
.tag-tap-chip{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;cursor:pointer}

.setlist-text-display{font-size:12px;color:var(--text);white-space:pre-wrap;line-height:1.9;padding:8px 4px}
.setlist-edit-inline-btn{margin-top:6px;display:inline-flex;align-items:center;gap:3px;font-size:10px;color:var(--text2);background:none;border:1px solid var(--border);border-radius:20px;padding:3px 10px;cursor:pointer}
.setlist-area{width:100%;min-height:140px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px;font-size:16px;font-family:inherit;resize:vertical}
.setlist-empty{font-size:11px;color:var(--text2);padding:6px 4px}

.mob-tabs{display:none;gap:0;background:var(--card);border-radius:var(--radius);padding:3px;border:1px solid var(--border-light);position:sticky;top:0;z-index:60}
@media(max-width:540px){.mob-tabs{display:flex}}
.mob-tab{flex:1;padding:7px 4px;border:none;border-radius:8px;background:none;color:var(--text2);font-size:12px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px}
.mob-tab.active{background:var(--bg);color:var(--dot);font-weight:600;box-shadow:0 1px 4px rgba(0,0,0,.08)}

.picker-anchor{position:relative;display:inline-flex;flex-direction:column;align-items:center;z-index:100}
.main-picker-popup{
  position:fixed !important;top:50% !important;left:50% !important;transform:translate(-50%,-50%) !important;
  z-index:9999 !important;background:var(--bg);border:2px solid var(--border-light);border-radius:24px;
  padding:18px 14px 16px;width:260px;
  box-shadow:0 12px 40px rgba(0,0,0,.14);
}
.picker-years{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:4px;margin-bottom:14px}
.picker-year-btn{padding:6px 4px;border-radius:999px;border:2px solid var(--border-light);background:var(--card);color:var(--text2);font-size:12px;font-weight:700;cursor:pointer;width:100%}
.picker-year-btn.sel{border-color:var(--dot);background:var(--dot);color:#fff}
.picker-months{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.picker-month-btn{aspect-ratio:1;border-radius:50%;border:2px solid var(--border-light);background:var(--card);color:var(--text);font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center}
.picker-month-btn.sel{border-color:var(--dot);background:var(--dot);color:#fff}
.picker-overlay-bg{position:fixed;inset:0;z-index:199}

.color-swatch{width:32px;height:32px;border-radius:50%;border:2.5px solid var(--border-light);cursor:pointer}
@keyframes spin{to{transform:rotate(360deg)}.spin{animation:spin 1s linear infinite}}
</style>
</head>
<body>
<div class="app">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem">
    <h1><i class="ti ti-calendar-event"></i>ライブカレンダー</h1>
    <div style="display:flex;align-items:center;gap:6px">
      <div class="sync-indicator" id="syncIndicator"><i class="ti ti-cloud"></i> 接続中...</div>
      <button id="headerLogoutBtn" style="display:none;background:none;border:1px solid var(--border);border-radius:var(--radius-sm);padding:3px 8px;font-size:11px;cursor:pointer;color:var(--text2)" onclick="firebase.auth().signOut().then(()=>location.reload())"><i class="ti ti-logout"></i> ログアウト</button>
    </div>
  </div>

  <div class="login-bar" id="loginBar">
    <div class="user-info" id="userInfo">ログインするとチェキ・セトリを記録できます</div>
    <button class="btn-login" id="loginBtn"><i class="ti ti-brand-google"></i> Googleでログイン</button>
  </div>

  <div class="nav desk-only" style="display:flex;align-items:center;gap:5px;margin-bottom:.5rem">
    <button class="icon-btn" id="prevBtn"><i class="ti ti-chevron-left"></i></button>
    <div class="picker-anchor">
      <button id="monthLabel" onclick="toggleMainPicker()" style="background:none;border:none;cursor:pointer;font-size:15px;font-weight:700;color:var(--text);min-width:118px"></button>
      <div id="mainPickerWrapDesk" style="display:none"></div>

function loadPublicData(){
  updateSync('syncing');
  db.collection('events').orderBy('date','asc').get().then(qs=>{
    eventsData=qs.docs.map(d=>({id:d.id,...d.data()}));
    db.collection('tags').get().then(tqs=>{tagsData=tqs.docs.map(d=>({id:d.id,...d.data()}));updateSync('ok');renderAll()});
  }).catch(e=>updateSync('err'));
}
function loadData(){
  updateSync('syncing');
  db.collection('events').orderBy('date','asc').get().then(qs=>{
    eventsData=qs.docs.map(d=>({id:d.id,...d.data()}));
    db.collection('tags').get().then(tqs=>{
      tagsData=tqs.docs.map(d=>({id:d.id,...d.data()}));
      if(currentUser){
        db.collection('users').doc(currentUser.uid).collection('privates').get().then(pqs=>{
          const pm=new Map();pqs.forEach(d=>pm.set(d.id,d.data()));
          eventsData.forEach(ev=>{
            const p=pm.get(ev.id);
            if(p){ev.myCheki=p.cheki||[];ev.mySetlist=p.setlist||'';ev.hasPriv=true}
            else{ev.myCheki=[];ev.mySetlist='';ev.hasPriv=false}
          });
          updateSync('ok');renderAll();
        });
      }else{updateSync('ok');renderAll()}
    });
  }).catch(e=>updateSync('err'));
}

function buildCalendar(){
  const lbl=document.getElementById('monthLabel'),mlbl=document.getElementById('mmonthLabel');
  lbl.innerHTML=`${currentYear}年 ${currentMonth}月 <i class="ti ti-selector" style="font-size:12px;color:var(--text2)"></i>`;
  mlbl.innerHTML=`${currentYear}年 ${currentMonth}月 <i class="ti ti-selector" style="font-size:12px;color:var(--text2)"></i>`;
  const h=document.getElementById('calGridHdr'),g=document.getElementById('calGrid');h.innerHTML='';g.innerHTML='';
  ['月','火','水','木','金','土','日'].forEach((d,idx)=>{
    const div=document.createElement('div');div.className='day-hdr'+(idx===5?' sat':idx===6?' sun':'');div.textContent=d;h.appendChild(div);
  });
  const first=new Date(currentYear,currentMonth-1,1),last=new Date(currentYear,currentMonth,0);
  let startDow=first.getDay();if(startDow===0)startDow=7;const prevLast=new Date(currentYear,currentMonth-1,0).getDate();
  for(let i=startDow-1;i>0;i--){
    const d=prevLast-i+1,m=currentMonth==1?12:currentMonth-1,y=currentMonth==1?currentYear-1:currentYear;g.appendChild(createCell(y,m,d,true));
  }
  for(let d=1;d<=last.getDate();d++){g.appendChild(createCell(currentYear,currentMonth,d,false))}
  let total=g.children.length,nextIdx=1;
  while(total%7!==0){
    const m=currentMonth==12?1:currentMonth+1,y=currentMonth==12?currentYear+1:currentYear;g.appendChild(createCell(y,m,nextIdx++,true));total++;
  }
}
function createCell(y,m,d,isOther){

  const num=document.createElement('div');num.className='dnum';num.textContent=d;cell.appendChild(num);

  const dt=new Date(e.date),dow=['日','月','火','水','木','金','土'][dt.getDay()];let dateDisp=`${dt.getMonth()+1}/${dt.getDate()}(${dow})`;if(HOLIDAYS_2024_2026[e.date])dateDisp=`${dt.getMonth()+1}/${dt.getDate()}(祝)`;

  card.appendChild(inner);return card;

  });
  let carHtml=list.length>0?`<div class="cheki-carousel"><div class="cheki-track" style="width:${list.length*100}%">${slides}</div>${list.length>1?`<button class="carousel-btn prev" onclick="moveCarousel(this,-1,true)"><i class="ti ti-chevron-left"></i></button><button class="carousel-btn next" onclick="moveCarousel(this,1,true)"><i class="ti ti-chevron-right"></i></button>`:''}</div>${list.length>1?`<div class="carousel-dots">${dots}</div>`:''}`:`<div class="cheki-empty">登録されたチェキはありません</div>`;
  sec.innerHTML=`<div class="cheki-edit-bar"><span style="font-size:11px;font-weight:600;color:var(--text)">チェキ記録</span><button class="cheki-edit-toggle" onclick="toggleChekiEditMode('${ev.id}')"><i class="ti ti-settings"></i> 編集・追加</button></div><div id="chekiDisplayZone-${ev.id}">${carHtml}</div>`;
}
function toggleChekiEditMode(evId){
  const ev=eventsData.find(x=>x.id===evId),zone=document.getElementById(`chekiDisplayZone-${evId}`);if(!ev||!zone)return;
  if(zone.dataset.mode==='edit'){zone.dataset.mode='display';renderChekiSection(ev,document.getElementById(`priv-sec-${evId}`));return}
  zone.dataset.mode='edit';let gridHtml='';const list=ev.myCheki||[];
  list.forEach((c,i)=>{
    gridHtml+=`<div class="cheki-edit-item"><img src="${c.url}" onclick="zoomImage('${c.url}')"><div class="cheki-edit-controls"><button class="cheki-edit-btn" onclick="moveChekiOrder('${ev.id}',${i},-1)" ${i===0?'disabled':''}><i class="ti ti-arrow-left"></i></button><button class="cheki-edit-btn" onclick="moveChekiOrder('${ev.id}',${i},1)" ${i===list.length-1?'disabled':''}><i class="ti ti-arrow-right"></i></button><button class="cheki-edit-btn del" onclick="deleteCheki('${ev.id}',${i})"><i class="ti ti-trash"></i></button></div></div>`;
  });
  zone.innerHTML=`<div class="cheki-edit-grid">${gridHtml}</div><div class="cheki-add-zone"><i class="ti ti-plus"></i> チェキ画像を追加<input type="file" accept="image/*" onchange="uploadCheki(this,'${evId}')"></div>`;
}
function uploadCheki(input,evId){
  const f=input.files[0];if(!f)return;updateSync('syncing');showToast("アップロード中...");
  const ref=storage.ref().child(`users/${currentUser.uid}/cheki/${Date.now()}_${f.name}`);
  ref.put(f).then(s=>s.ref.getDownloadURL()).then(url=>{
    const ev=eventsData.find(x=>x.id===evId);if(!ev)return;if(!ev.myCheki)ev.myCheki=[];ev.myCheki.push({url:url,createdAt:Date.now()});
    savePrivateData(ev).then(()=>{
      showToast("チェキを追加しました");updateSync('ok');toggleChekiEditMode(evId);const cbtn=document.getElementById(`c-btn-${evId}`);if(cbtn)cbtn.textContent=`チェキ (${ev.myCheki.length})`;
    });
  }).catch(()=>updateSync('err'));
}
function deleteCheki(evId,idx){
  if(!confirm("このチェキを削除しますか？"))return;const ev=eventsData.find(x=>x.id===evId);if(!ev||!ev.myCheki)return;
  ev.myCheki.splice(idx,1);updateSync('syncing');
  savePrivateData(ev).then(()=>{showToast("削除しました");updateSync('ok');toggleChekiEditMode(evId);const cbtn=document.getElementById(`c-btn-${evId}`);if(cbtn)cbtn.textContent=`チェキ (${ev.myCheki.length})`}).catch(()=>updateSync('err'));
}
function moveChekiOrder(evId,idx,dir){
  const ev=eventsData.find(x=>x.id===evId);if(!ev||!ev.myCheki)return;const list=ev.myCheki,target=idx+dir;if(target<0||target>=list.length)return;
  const temp=list[idx];list[idx]=list[target];list[target]=temp;updateSync('syncing');savePrivateData(ev).then(()=>{updateSync('ok');toggleChekiEditMode(evId)}).catch(()=>updateSync('err'));
}
function renderSetlistSection(ev,sec){
  const text=ev.mySetlist||'';
  sec.innerHTML=`<div style="display:flex;align-items:center;margin-bottom:4px"><span style="font-size:11px;font-weight:600;color:var(--text)">セットリスト</span></div><div id="setlistZone-${ev.id}">${text?`<div class="setlist-text-display">${text}</div><button class="setlist-edit-inline-btn" onclick="openSetlistEditMode('${ev.id}')"><i class="ti ti-edit"></i> 編集する</button>`:`<div class="setlist-empty">セットリストは未登録です</div><button class="setlist-edit-inline-btn" onclick="openSetlistEditMode('${ev.id}')"><i class="ti ti-plus"></i> セトリを記録する</button>`}</div>`;
}
function openSetlistEditMode(evId){
  const ev=eventsData.find(x=>x.id===evId),zone=document.getElementById(`setlistZone-${evId}`);if(!ev||!zone)return;
  zone.innerHTML=`<textarea class="setlist-area" id="setlistTa-${evId}" placeholder="1. 曲名&#13;2. 曲名">${ev.mySetlist||''}</textarea><div style="display:flex;gap:6px;margin-top:6px;justify-content:flex-end"><button class="btn-s" style="padding:4px 10px;font-size:11px" onclick="renderSetlistSection(eventsData.find(x=>x.id==='${evId}'),document.getElementById('priv-sec-${evId}'))">キャンセル</button><button class="btn-p" style="padding:4px 14px;font-size:11px" onclick="saveSetlistInline('${evId}')">保存</button></div>`;
}
function saveSetlistInline(evId){
  const ev=eventsData.find(x=>x.id===evId),val=document.getElementById(`setlistTa-${evId}`).value.trim();if(!ev)return;ev.mySetlist=val;updateSync('syncing');
  savePrivateData(ev).then(()=>{showToast("セットリストを保存しました");updateSync('ok');renderSetlistSection(ev,document.getElementById(`priv-sec-${evId}`))}).catch(()=>updateSync('err'));
}
function savePrivateData(ev){if(!currentUser)return Promise.resolve();return db.collection('users').doc(currentUser.uid).collection('privates').doc(ev.id).set({cheki:ev.myCheki||[],setlist:ev.mySetlist||''})}

function moveCarousel(btn,dir,isCheki=false){
  const c=btn.parentElement,track=c.querySelector(isCheki?'.cheki-track':'.carousel-track');let idx=parseInt(c.dataset.idx||0);idx+=dir;
  const count=track.children.length;if(idx<0)idx=count-1;if(idx>=count)idx=0;c.dataset.idx=idx;track.style.transform=`translateX(-${idx*(100/count)}%)`;
  const dotsWrap=c.parentElement.querySelector('.carousel-dots');if(dotsWrap){dotsWrap.querySelectorAll('.carousel-dot').forEach((d,i)=>d.className='carousel-dot'+(i===idx?' active':''))}
}
function setCarouselSlide(dot,idx,isCheki=false){
  const dotsWrap=dot.parentElement,cWrap=dotsWrap.parentElement,track=cWrap.querySelector(isCheki?'.cheki-track':'.carousel-track'),c=cWrap.querySelector(isCheki?'.cheki-carousel':'.carousel');
  c.dataset.idx=idx;track.style.transform=`translateX(-${idx*(100/track.children.length)}%)`;dotsWrap.querySelectorAll('.carousel-dot').forEach((d,i)=>d.className='carousel-dot'+(i===idx?' active':''));
}
function zoomImage(url){
  const v=document.createElement('div');v.className='img-overlay';v.onclick=()=>v.remove();
  v.innerHTML=`<img src="${url}"><button class="img-overlay-close"><i class="ti ti-x"></i></button>`;document.body.appendChild(v);
}

function toggleMainPicker(){
  const wDesk=document.getElementById('mainPickerWrapDesk'),wMob=document.getElementById('mainPickerWrap'),isOpen=wDesk.style.display==='block'||wMob.style.display==='block';
  if(isOpen){wDesk.style.display='none';wMob.style.display='none';document.getElementById('pickerBg')?.remove();return}
  pickerActiveYear=currentYear;
  const html=`<div class="main-picker-popup" onclick="event.stopPropagation()"><div class="picker-years">${[2024,2025,2026].map(y=>`<button class="picker-year-btn${y===pickerActiveYear?' sel':''}" onclick="changePickerYear(this,${y})">${y}</button>`).join('')}</div><div class="picker-months">${Array.from({length:12},(_,i)=>i+1).map(m=>`<button class="picker-month-btn${m===currentMonth&&pickerActiveYear===currentYear?' sel':''}" onclick="selectPickerMonth(${m})">${m}月</button>`).join('')}</div></div>`;
  wDesk.innerHTML=html;wMob.innerHTML=html;wDesk.style.display=window.innerWidth>540?'block':'none';wMob.style.display=window.innerWidth<=540?'block':'none';
  const bg=document.createElement('div');bg.id='pickerBg';bg.className='picker-overlay-bg';bg.onclick=toggleMainPicker;document.body.appendChild(bg);
}
function changePickerYear(btn,y){
  pickerActiveYear=y;btn.parentElement.querySelectorAll('.picker-year-btn').forEach(b=>b.classList.remove('sel'));btn.classList.add('sel');
  btn.closest('.main-picker-popup').querySelector('.picker-months').innerHTML=Array.from({length:12},(_,i)=>i+1).map(m=>`<button class="picker-month-btn${m===currentMonth&&pickerActiveYear===currentYear?' sel':''}" onclick="selectPickerMonth(${m})">${m}月</button>`).join('');
}
function selectPickerMonth(m){currentYear=pickerActiveYear;currentMonth=m;toggleMainPicker();renderAll()}

let modalFlyers=[];
function openAddModal(dateStr=''){
  if(!currentUser){showToast("ログインが必要です");return}
  modalFlyers=[];const todayStr=dateStr||new Date().toISOString().split('T')[0];
  document.getElementById('modalContainer').innerHTML=`<div class="modal-bg" onclick="closeModal()"><div class="modal" onclick="event.stopPropagation()"><h2>イベント追加</h2><div class="fg" style="margin-bottom:.65rem"><label>イベント名 *</label><input type="text" id="f-title" required></div><div class="form-row date-venue-row"><div class="fg"><label>日程 *</label><input type="date" id="f-date" value="${todayStr}" required></div><div class="fg"><label>会場</label><input type="text" id="f-venue"></div></div><div class="form-row two-col-mob"><div class="fg"><label>開場時間</label><div class="time-sel-row"><select id="f-open-h">${buildHourOptions()}</select><span>:</span><select id="f-open-m">${buildMinOptions()}</select></div></div><div class="fg"><label>開演時間</label><div class="time-sel-row"><select id="f-start-h">${buildHourOptions()}</select><span>:</span><select id="f-start-m">${buildMinOptions()}</select></div></div></div><div class="fg" style="margin-bottom:.65rem"><label>チケットURL</label><input type="url" id="f-ticket"></div><div class="fg" style="margin-bottom:.65rem"><label>タグ</label><div class="tag-tap-area" id="modalTagTapArea"></div></div><div class="fg" style="margin-bottom:.65rem"><label>画像</label><div class="drop-zone"><i class="ti ti-upload"></i><p>選択</p><input type="file" accept="image/*" multiple onchange="handleModalFlyerSelect(this)"></div><div class="flyer-previews" id="flyerPreviews"></div></div><div class="fg" style="margin-bottom:.65rem"><label>メモ</label><textarea id="f-detail"></textarea></div><div class="modal-acts"><button class="btn-s" onclick="closeModal()">キャンセル</button><button class="btn-p" onclick="saveEvent()">保存</button></div></div></div>`;
  renderModalTagTapArea([]);
}
function renderModalTagTapArea(selectedIds){
  const area=document.getElementById('modalTagTapArea');if(!area)return;area.innerHTML='';
  tagsData.forEach(t=>{
    const isSel=selectedIds.includes(t.id),chip=document.createElement('div');chip.className='tag-tap-chip';chip.style.background=isSel?t.color:'var(--border-light)';chip.style.color=isSel?'#fff':'var(--text)';chip.textContent=t.name;
    chip.onclick=()=>{let idx=selectedIds.indexOf(t.id);if(idx>-1){selectedIds.splice(idx,1)}else{selectedIds.push(t.id)}renderModalTagTapArea(selectedIds)};area.appendChild(chip);
  });
  area.dataset.selected=JSON.stringify(selectedIds);
}
function openEditModal(id){
  const e=eventsData.find(x=>x.id===id);if(!e)return;openAddModal(e.date);
  const m=document.getElementById('modalContainer');m.querySelector('h2').textContent='イベント編集';
  document.getElementById('f-title').value=e.title;document.getElementById('f-venue').value=e.venue||'';
  if(e.openTime){const[h,min]=e.openTime.split(':');document.getElementById('f-open-h').value=h;document.getElementById('f-open-m').value=min}
  if(e.startTime){const[h,min]=e.startTime.split(':');document.getElementById('f-start-h').value=h;document.getElementById('f-start-m').value=min}
  document.getElementById('f-ticket').value=e.ticketUrl||'';document.getElementById('f-detail').value=e.detail||'';
  modalFlyers=e.flyers?([...e.flyers]):[];renderFlyerPreviews();renderModalTagTapArea(e.tags?([...e.tags]):[]);m.querySelector('.btn-p').onclick=()=>saveEvent(id);
}
function closeModal(){document.getElementById('modalContainer').innerHTML=''}
function buildHourOptions(){let h='<option value="">--</option>';for(let i=0;i<24;i++)h+=`<option value="${String(i).padStart(2,'0')}">${String(i).padStart(2,'0')}</option>`;return h}
function buildMinOptions(){let m='<option value="">--</option>';for(let i=0;i<60;i+=5)m+=`<option value="${String(i).padStart(2,'0')}">${String(i).padStart(2,'0')}</option>`;return m}

function handleModalFlyerSelect(input){
  const files=Array.from(input.files);if(files.length===0)return;updateSync('syncing');
  let promises=files.map(f=>{const ref=storage.ref().child(`flyers/${Date.now()}_${f.name}`);return ref.put(f).then(s=>s.ref.getDownloadURL())});
  Promise.all(promises).then(urls=>{modalFlyers=modalFlyers.concat(urls);renderFlyerPreviews();showToast("追加しました");updateSync('ok')}).catch(()=>updateSync('err'));
}
function renderFlyerPreviews(){
  const p=document.getElementById('flyerPreviews');p.innerHTML='';
  modalFlyers.forEach((url,idx)=>{const item=document.createElement('div');item.className='flyer-preview-item';item.innerHTML=`<img src="${url}"><button class="rm-flyer" onclick="removeModalFlyer(${idx})"><i class="ti ti-x"></i></button>`;p.appendChild(item)});
}
function removeModalFlyer(idx){modalFlyers.splice(idx,1);renderFlyerPreviews()}

function saveEvent(id=null){
  const title=document.getElementById('f-title').value.trim(),date=document.getElementById('f-date').value,venue=document.getElementById('f-venue').value.trim();if(!title||!date){showToast("タイトルと日程は必須です");return}
  const oh=document.getElementById('f-open-h').value,om=document.getElementById('f-open-m').value,openTime=(oh&&om)?`${oh}:${om}`:'';
  const sh=document.getElementById('f-start-h').value,sm=document.getElementById('f-start-m').value,startTime=(sh&&sm)?`${sh}:${sm}`:'';
  const ticketUrl=document.getElementById('f-ticket').value.trim(),detail=document.getElementById('f-detail').value.trim(),tags=JSON.parse(document.getElementById('modalTagTapArea').dataset.selected||'[]');
  const data={title,date,venue,openTime,startTime,ticketUrl,detail,flyers:modalFlyers,tags,updatedAt:Date.now()};updateSync('syncing');
  const p=id?db.collection('events').doc(id).update(data):db.collection('events').add(data);
  p.then(()=>{showToast("保存しました");closeModal();loadData()}).catch(()=>updateSync('err'));
}
function deleteEvent(id){
  if(!confirm("削除しますか？"))return;updateSync('syncing');
  db.collection('events').doc(id).delete().then(()=>{if(currentUser)return db.collection('users').doc(currentUser.uid).collection('privates').doc(id).delete();return Promise.resolve()})
  .then(()=>{showToast("削除しました");closeModal();loadData()}).catch(()=>updateSync('err'));
}

document.getElementById('prevBtn').onclick=()=>moveMonth(-1);document.getElementById('nextBtn').onclick=()=>moveMonth(1);
document.getElementById('mprevBtn').onclick=()=>moveMonth(-1);document.getElementById('mnextBtn').onclick=()=>moveMonth(1);
document.getElementById('addBtn').onclick=()=>openAddModal();document.getElementById('mobAddFab').onclick=()=>openAddModal();

function moveMonth(dir){currentMonth+=dir;if(currentMonth>12){currentMonth=1;currentYear++}if(currentMonth<1){currentMonth=12;currentYear--}renderAll()}
function switchMobTab(type){
  currentTab=type;document.getElementById('tabSchedule').className='mob-tab'+(type==='schedule'?' active':'');document.getElementById('tabCal').className='mob-tab'+(type==='cal'?' active':'');
  const ov=document.getElementById('mobCalOverlay'),v=document.getElementById('mobView');if(type==='cal'){ov.classList.add('open');v.style.display='none'}else{ov.classList.remove('open');v.style.display='flex'}
  if(type==='schedule'){
    setTimeout(()=>{
      const todayCard=document.querySelector('.mob-card .mob-dnum.td')?.closest('.mob-card');
      if(todayCard){window.scrollTo({top:todayCard.offsetTop-140,behavior:'instant'})}
    },80);
  }
}

applyTheme(currentTheme);buildCalendar();renderPanel();renderMobile();

(function(){
  let txStart=0,tyStart=0;const ov=document.getElementById('mobCalOverlay');
  document.addEventListener('touchstart',function(e){txStart=e.touches[0].clientX;tyStart=e.touches[0].clientY},{passive:true});
  document.addEventListener('touchend',function(e){
    if(document.getElementById('modalContainer').innerHTML)return;
    const dx=e.changedTouches[0].clientX-txStart,dy=e.changedTouches[0].clientY-tyStart;
    if(Math.abs(dx)>Math.abs(dy)*1.5&&Math.abs(dx)>50){if(dx>0&&!ov.classList.contains('open')){switchMobTab('cal')}else if(dx<0&&ov.classList.contains('open')){switchMobTab('schedule')}}
  },{passive:true});
})();

(function(){
  let lastScrollY=0;
  document.addEventListener('focusin',function(e){
    if(e.target.tagName==='TEXTAREA'||e.target.tagName==='INPUT'){
      lastScrollY=window.scrollY;document.querySelector('.mob-add-fab').style.display='none';
    }
  },{passive:true});
  document.addEventListener('focusout',function(e){
    if(e.target.tagName==='TEXTAREA'||e.target.tagName==='INPUT'){
      setTimeout(function(){
        window.scrollTo({top:lastScrollY,behavior:'smooth'});document.querySelector('.mob-add-fab').style.display='flex';
      },40);
    }
  },{passive:true});
})();
</script>
</body>
